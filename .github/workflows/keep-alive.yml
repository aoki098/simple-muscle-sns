name: Supabase自動起床ロボット

on:
  schedule:
    - cron: "0 0 * * 1,4"
  workflow_dispatch:

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    steps:
      - name: データベースにアクセス（Ping送信）
        run: |
          curl -s -X GET '${{ secrets.SUPABASE_URL }}/rest/v1/' \
          -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
          -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}"
